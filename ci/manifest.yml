projects:
  - libvirt-php
  - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+dist.yml

gitlab:
  namespace: libvirt
  project: libvirt-php

targets:
  alpine-322:
    jobs:
      - arch: x86_64
        variables:
          CONFIGURE_ARGS: --with-php=/usr/bin/php83 --with-php-config=/usr/bin/php-config83

  alpine-323:
    jobs:
      - arch: x86_64
        variables:
          CONFIGURE_ARGS: --with-php=/usr/bin/php83 --with-php-config=/usr/bin/php-config83

  alpine-edge:
    jobs:
      - arch: x86_64
        variables:
          CONFIGURE_ARGS: --with-php=/usr/bin/php83 --with-php-config=/usr/bin/php-config83

  debian-12: x86_64

  debian-13:
    projects:
      - libvirt-php
      - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+minimal.yml
      - https://gitlab.com/libvirt/libvirt/-/raw/master/ci/lcitool/projects/libvirt+dist.yml

    jobs:
      - arch: x86_64
      - arch: x86_64
        template: .native_git_build_job
        suffix: -git

  debian-13: x86_64

  debian-sid: x86_64

  fedora-43: x86_64

  fedora-44: x86_64

  fedora-rawhide: x86_64

  opensuse-leap-15: x86_64

  opensuse-leap-16: x86_64

  opensuse-tumbleweed: x86_64

  ubuntu-2404: x86_64

  ubuntu-2604: x86_64
